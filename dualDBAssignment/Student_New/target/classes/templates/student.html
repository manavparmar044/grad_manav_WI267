<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Card-like Form Container */
        .form-container { 
            width: 350px; 
            padding: 30px; 
            background-color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px; 
        }

        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0;
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        /* Styled Inputs */
        input { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.2);
        }

        /* Button Styling */
        .buttons { display: flex; gap: 15px; margin-top: 25px; }

        button { 
            flex: 1;
            padding: 12px; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 6px;
            border: none;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .btn-insert { background-color: #4CAF50; color: white; }
        .btn-reset { background-color: #f44336; color: white; }
        
        button:hover { opacity: 0.9; }

        /* Error Message Styling */
        .error-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #f44336;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Student Form</h2>
        
        <div th:if="${error}" class="error-box">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/insert}" th:object="${student}" method="post">
            <div class="form-group">
                <label for="rollNo">Roll No:</label>
                <input type="number" id="rollNo" th:field="*{rollNo}" required />
            </div>
            
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" th:field="*{name}" required />
            </div>
            
            <div class="form-group">
                <label for="standard">Standard:</label>
                <input type="text" id="standard" th:field="*{standard}" required />
            </div>
            
            <div class="form-group">
                <label for="school">School:</label>
                <input type="text" id="school" th:field="*{school}" required />
            </div>
            
            <div class="buttons">
                <button type="submit" class="btn-insert">INSERT</button>
                <button type="reset" class="btn-reset">RESET</button>
            </div>
        </form>
    </div>

</body>
</html>
