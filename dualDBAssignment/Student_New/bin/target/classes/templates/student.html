<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-container { width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .buttons { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
        .btn-insert { background-color: #4CAF50; color: white; border: none; }
        .btn-reset { background-color: #f44336; color: white; border: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Student Form</h2>
        <form th:action="@{/insert}" th:object="${student}" method="post">
            <div class="form-group">
                <label for="rollNo">Roll No:</label>
                <input type="number" id="rollNo" th:field="*{rollNo}" required />
            </div>
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" th:field="*{name}" required />
            </div>
            <div class="form-group">
                <label for="standard">Standard:</label>
                <input type="text" id="standard" th:field="*{standard}" required />
            </div>
            <div class="form-group">
                <label for="school">School:</label>
                <input type="text" id="school" th:field="*{school}" required />
            </div>
            <div class="buttons">
                <button type="submit" class="btn-insert">INSERT</button>
                <button type="reset" class="btn-reset">RESET</button>
            </div>
        </form>
    </div>
</body>
</html>
